<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StackBet — Mines</title>
  <link rel="icon" href="../icons/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/app.css"/>
  <link rel="stylesheet" href="../css/games.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<nav class="sidebar" id="sidebar">
  <div class="sb-header">
    <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <span class="sb-logo-name">StackBet</span>
  </div>
  <div class="nav">
    <a href="dashboard.html" class="nav-link" data-label="Dashboard"><img src="../icons/nav-lobby.png"    alt=""/><span>Dashboard</span></a>
    <a href="slots.html"     class="nav-link" data-label="Slots"    ><img src="../icons/nav-slots.png"    alt=""/><span>Slots</span></a>
    <a href="coinflip.html"  class="nav-link" data-label="Coinflip" ><img src="../icons/nav-coinflip.png" alt=""/><span>Coinflip</span></a>
    <a href="dice.html"      class="nav-link" data-label="Dice"     ><img src="../icons/nav-dice.png"     alt=""/><span>Dice</span></a>
    <a href="mines.html"     class="nav-link active" data-label="Mines"    ><img src="../icons/nav-mines.png"    alt=""/><span>Mines</span></a>
    <a href="crash.html"     class="nav-link" data-label="Crash"    ><img src="../icons/nav-crash.png"    alt=""/><span>Crash</span></a>
    <a href="deposit.html"   class="nav-link" data-label="Deposit"  ><img src="../icons/deposit.png"      alt=""/><span>Deposit</span></a>
  </div>
  <div class="sb-user"><div class="js-avatar"></div><span class="sb-uname js-username">—</span></div>
</nav>
<div class="topbar">
  <div class="bal-chip"><img src="../icons/chip.png" alt="chips"/>$<span class="js-balance">0.00</span></div>
  <button class="btn-logout" onclick="logout()"><img src="../icons/logout.png" alt="logout"/></button>
</div>
<div class="content"><div class="page-inner"><div class="game-wrap">
  <div class="game-hdr"><h1>💣 Mines</h1><p>Reveal gems, avoid bombs. Cash out before you explode.</p></div>
  <div class="game-panel">
    <div class="mines-set">
      <label>Number of mines:</label>
      <select id="mineCount">
        <option value="1">1 Mine</option>
        <option value="3" selected>3 Mines</option>
        <option value="5">5 Mines</option>
        <option value="10">10 Mines</option>
        <option value="15">15 Mines</option>
      </select>
    </div>
    <div class="mines-stats">
      <div class="m-stat"><div class="val" id="mGems">0</div><div class="lbl">Gems Found</div></div>
      <div class="m-stat"><div class="val" id="mMulti">1.00×</div><div class="lbl">Multiplier</div></div>
      <div class="m-stat"><div class="val" id="mProfit">$0.00</div><div class="lbl">Profit if cashout</div></div>
    </div>
    <div class="mines-grid" id="mGrid"></div>
    <div id="mBetArea">
      <label class="bet-label">BET AMOUNT</label>
      <div class="bet-row">
        <input class="bet-input" type="number" id="minesBet" value="10" min="1"/>
        <div class="qbtns">
          <button class="qbtn" onclick="half('minesBet')">½</button>
          <button class="qbtn" onclick="dbl('minesBet')">2×</button>
          <button class="qbtn" onclick="mx('minesBet')">Max</button>
        </div>
      </div>
      <button class="btn-play" onclick="startMines()">Start Game</button>
    </div>
    <button class="btn-cashout hidden" id="mCashBtn" onclick="minesCashout()">💰 Cash Out</button>
  </div>
</div></div></div>
<div id="toast" class="toast"></div>
<script src="../js/config.js"></script><script src="../js/db.js"></script>
<script src="../js/session.js"></script><script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script><script src="../js/mines.js"></script>
<script src="../js/admin.js"></script>
</body></html>
